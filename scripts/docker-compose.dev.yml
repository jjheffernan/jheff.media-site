
services:
  frontend:
    build:
      context: "../"
      dockerfile: frontend/Dockerfile
    container_name: "yew-fullstack-frontend"
    working_dir: /usr/src/workspace/frontend
    ports:
      - "8000:8000"
    volumes:
      - "../:/usr/src/workspace"

  backend:
    build:
      context: "../"
      dockerfile: backend/Dockerfile
    container_name: "yew-fullstack-backend"
    working_dir: /usr/src/workspace
    environment:
      - "YEW_FULLSTACK_HOST=0.0.0.0"
      - "YEW_FULLSTACK_PORT=8080"
      - "YEW_FULLSTACK_FORWARD_FRONTEND_URL=http://frontend:8000"
      - "YEW_FULLSTACK_DB_CONNSTR=mongodb://db:27017"
      - "YEW_FULLSTACK_DB_NAME=yew-fullstack_dev"
      - "YEW_FULLSTACK_FEED_PROVIDER=static"
      - "YEW_FULLSTACK_FEED_STATIC_JSON=[{\"id\":\"1\",\"thumbnailUrl\":\"https://picsum.photos/seed/auto1/800/600\",\"title\":\"Sample 1\"},{\"id\":\"2\",\"thumbnailUrl\":\"https://picsum.photos/seed/auto2/800/600\",\"title\":\"Sample 2\"},{\"id\":\"3\",\"thumbnailUrl\":\"https://picsum.photos/seed/auto3/800/600\",\"title\":\"Sample 3\"}]"
    ports:
      - "8080:8080"
    volumes:
      - "../:/usr/src/workspace"
      - backend-cargo-target:/usr/src/workspace/target
    depends_on:
      - db
      - frontend

  db:
    image: "mongo:7.0"
    container_name: "yew-fullstack-database"
    environment:
      - MONGODB_INITDB_DATABASE=yew-fullstack_dev
      - MONGODB_INITDB_ROOT_USERNAME=root
      - MONGODB_INITDB_ROOT_PASSWORD=password
    ports:
      - "27017-27019:27017-27019"

volumes:
  backend-cargo-target:
