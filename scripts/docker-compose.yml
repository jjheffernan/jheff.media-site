version: "2.4"

services:
  application:
    image: "yew-fullstack/application"
    container_name: "application-container"
    environment:
      - "YEW_FULLSTACK_HOST=0.0.0.0"
      - "YEW_FULLSTACK_PORT=8080"
      - "YEW_FULLSTACK_DB_CONNSTR=mongodb://root:password@db:27017/yew-fullstack?authSource=admin"
      - "YEW_FULLSTACK_DB_NAME=yew-fullstack"
    ports:
      - "8080:8080"
    depends_on:
      - db

  db:
    image: "mongo:7.0"
    container_name: "database-container"
    environment:
      - MONGODB_INITDB_DATABASE=yew-fullstack
      - MONGODB_INITDB_ROOT_USERNAME=root
      - MONGODB_INITDB_ROOT_PASSWORD=password
    ports:
      - "27017:27017"
